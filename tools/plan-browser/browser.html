<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Plan Browser</title>
<style>
/* ── tokens (matches visual-plan design system) ─────────────────── */
:root, :root[data-theme="light"] {
  color-scheme: light;
  --bg: #f4f3ee;
  --bg-elev: #fffdf8;
  --bg-sunken: #ece7db;
  --fg: #1b1a17;
  --fg-muted: #6b6760;
  --fg-faint: #9a9384;
  --border: #d8d4ca;
  --border-strong: #8c8474;
  --accent: #9b2d2d;
  --accent-fg: #ffffff;
  --accent-soft: #f1dad7;
  --ring: rgba(155, 45, 45, 0.4);
  --status-draft: #6b6760;    --status-draft-bg: #ece7db;
  --status-proposed: #8a5d00; --status-proposed-bg: #f4ead0;
  --status-approved: #3f7a33; --status-approved-bg: #e3efda;
  --mono: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
  --sans: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
}
:root[data-theme="dark"] {
  color-scheme: dark;
  --bg: #1c1a16;
  --bg-elev: #24211b;
  --bg-sunken: #16140f;
  --fg: #ece5d6;
  --fg-muted: #b1a994;
  --fg-faint: #7e7768;
  --border: #36322a;
  --border-strong: #524b3e;
  --accent: #d4685a;
  --accent-fg: #1c1a16;
  --accent-soft: #36211c;
  --ring: rgba(212, 104, 90, 0.5);
  --status-draft: #b1a994;    --status-draft-bg: #211d17;
  --status-proposed: #d8a544; --status-proposed-bg: #2a2110;
  --status-approved: #7bbf67; --status-approved-bg: #1c2916;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--fg);
  min-height: 100vh;
}
/* ── topbar ─────────────────────────────────────────────────────── */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: 12px;
  padding: 10px 20px;
  background: var(--bg-elev);
  border-bottom: 2px solid var(--accent);
  font-family: var(--mono);
  font-size: 13px;
}
.topbar-mark {
  width: 8px; height: 8px; background: var(--accent); flex-shrink: 0;
}
.topbar-title { font-weight: 600; letter-spacing: 0.02em; }
.topbar-spacer { flex: 1; }
.topbar-count { color: var(--fg-muted); font-size: 12px; }
.theme-toggle {
  background: none; border: 1px solid var(--border);
  color: var(--fg-muted); cursor: pointer;
  padding: 4px 8px; font-family: var(--mono); font-size: 12px;
}
.theme-toggle:hover { border-color: var(--accent); color: var(--accent); }
/* ── layout ─────────────────────────────────────────────────────── */
.layout {
  display: flex; min-height: calc(100vh - 42px);
}
/* ── sidebar ────────────────────────────────────────────────────── */
.sidebar {
  width: 260px; flex-shrink: 0;
  padding: 16px;
  border-right: 1px solid var(--border);
  background: var(--bg-elev);
  overflow-y: auto;
  font-size: 13px;
}
.sidebar h3 {
  font-family: var(--mono);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--fg-faint);
  margin-bottom: 8px;
  margin-top: 16px;
}
.sidebar h3:first-child { margin-top: 0; }
.sidebar input[type="text"] {
  width: 100%;
  padding: 6px 8px;
  border: 1px solid var(--border);
  background: var(--bg);
  color: var(--fg);
  font-family: var(--mono);
  font-size: 12px;
  outline: none;
}
.sidebar input[type="text"]:focus { border-color: var(--accent); }
.sidebar .group-list, .sidebar .tag-list { list-style: none; }
.sidebar .group-list li, .sidebar .tag-list li {
  padding: 4px 8px;
  cursor: pointer;
  border-radius: 2px;
  font-family: var(--mono);
  font-size: 12px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.sidebar .group-list li:hover, .sidebar .tag-list li:hover {
  background: var(--bg-sunken);
}
.sidebar .group-list li.active, .sidebar .tag-list li.active {
  background: var(--accent-soft);
  color: var(--accent);
  font-weight: 600;
}
.sidebar .group-count, .sidebar .tag-count {
  margin-left: auto;
  color: var(--fg-faint);
  font-size: 11px;
}
/* ── main ───────────────────────────────────────────────────────── */
.main {
  flex: 1;
  padding: 20px;
  overflow-y: auto;
}
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--fg-muted);
  font-family: var(--mono);
  font-size: 13px;
}
/* ── plan cards ─────────────────────────────────────────────────── */
.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 16px;
}
.card {
  border: 1px solid var(--border);
  background: var(--bg-elev);
  padding: 16px;
  cursor: pointer;
  transition: border-color 0.15s;
}
.card:hover { border-color: var(--accent); }
.card-title {
  font-size: 15px;
  font-weight: 600;
  margin-bottom: 6px;
  line-height: 1.3;
}
.card-meta {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--fg-muted);
}
.status-badge {
  display: inline-block;
  padding: 1px 6px;
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.status-badge[data-status="draft"]    { color: var(--status-draft);    background: var(--status-draft-bg); }
.status-badge[data-status="proposed"] { color: var(--status-proposed); background: var(--status-proposed-bg); }
.status-badge[data-status="approved"] { color: var(--status-approved); background: var(--status-approved-bg); }
.card-chapters {
  color: var(--fg-faint);
  font-size: 11px;
  font-family: var(--mono);
}
.card-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  margin-top: 8px;
}
.tag-chip {
  display: inline-block;
  padding: 1px 6px;
  background: var(--bg-sunken);
  border: 1px solid var(--border);
  font-family: var(--mono);
  font-size: 10px;
  color: var(--fg-muted);
}
.card-notes {
  margin-top: 8px;
  font-size: 12px;
  color: var(--fg-muted);
  font-style: italic;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.card-actions {
  margin-top: 10px;
  display: flex;
  gap: 8px;
}
.btn {
  padding: 4px 10px;
  border: 1px solid var(--border);
  background: var(--bg);
  color: var(--fg);
  font-family: var(--mono);
  font-size: 11px;
  cursor: pointer;
  text-decoration: none;
  display: inline-block;
}
.btn:hover { border-color: var(--accent); color: var(--accent); }
.btn-accent {
  background: var(--accent);
  color: var(--accent-fg);
  border-color: var(--accent);
}
.btn-accent:hover { opacity: 0.85; }
/* ── expanded card overlay ──────────────────────────────────────── */
.overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.4);
  z-index: 200;
  justify-content: center;
  align-items: flex-start;
  padding-top: 60px;
}
.overlay.open { display: flex; }
.overlay-panel {
  background: var(--bg-elev);
  border: 2px solid var(--accent);
  width: 560px;
  max-height: 80vh;
  overflow-y: auto;
  padding: 24px;
}
.overlay-panel h2 {
  font-size: 18px;
  margin-bottom: 12px;
  line-height: 1.3;
}
.field-label {
  display: block;
  font-family: var(--mono);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--fg-faint);
  margin-bottom: 4px;
  margin-top: 12px;
}
.field-input {
  width: 100%;
  padding: 6px 8px;
  border: 1px solid var(--border);
  background: var(--bg);
  color: var(--fg);
  font-family: var(--mono);
  font-size: 12px;
  outline: none;
}
.field-input:focus { border-color: var(--accent); }
textarea.field-input {
  min-height: 60px;
  resize: vertical;
  font-family: var(--sans);
}
.field-hint {
  font-size: 11px;
  color: var(--fg-faint);
  margin-top: 2px;
}
.overlay-actions {
  margin-top: 16px;
  display: flex;
  gap: 8px;
  justify-content: flex-end;
}
.chapter-list {
  margin-top: 8px;
  font-size: 12px;
  color: var(--fg-muted);
}
.chapter-list li {
  padding: 2px 0;
  list-style: none;
}
.chapter-list li::before {
  content: "—";
  margin-right: 6px;
  color: var(--fg-faint);
}
/* ── archive zone (drag-to-archive) ────────────────────────────── */
.archive-zone {
  position: fixed; bottom: 20px; right: 20px; z-index: 50;
  width: 48px; height: 48px;
  border: 2px dashed var(--border);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--mono); font-size: 10px; color: var(--fg-faint);
  transition: all 0.25s ease;
  background: var(--bg);
  cursor: default;
  user-select: none;
  pointer-events: none;
}
.archive-zone .zone-label {
  opacity: 0;
  transition: opacity 0.2s;
  white-space: nowrap;
  margin-left: 4px;
}
.archive-zone .zone-icon {
  font-size: 18px; line-height: 1;
}
.archive-zone.drag-active {
  width: auto; height: auto;
  padding: 12px 20px;
  border-style: solid;
  border-color: var(--accent);
  background: var(--accent-soft);
  box-shadow: 0 0 20px var(--ring);
}
.archive-zone.drag-active .zone-label {
  opacity: 1;
}
.archive-zone.drag-hover {
  border-color: var(--accent);
  background: var(--accent);
  color: var(--accent-fg);
  box-shadow: 0 0 30px var(--ring);
  transform: scale(1.05);
}
.archive-zone.drag-hover .zone-label {
  color: var(--accent-fg);
}

/* drag ghost */
.drag-ghost {
  position: fixed; z-index: 500;
  pointer-events: none;
  opacity: 0.92;
  box-shadow: 0 8px 32px rgba(0,0,0,0.2);
  transition: transform 0.05s ease-out;
}
.card.dragging {
  opacity: 0.3;
}
/* ── responsive ─────────────────────────────────────────────────── */
@media (max-width: 720px) {
  .sidebar { display: none; }
  .card-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div class="topbar">
  <span class="topbar-mark"></span>
  <span class="topbar-title">Plan Browser</span>
  <span class="topbar-spacer"></span>
  <span class="topbar-count" id="plan-count"></span>
  <button class="theme-toggle" id="rescan-btn">Rescan</button>
  <button class="theme-toggle" id="theme-btn">Theme</button>
</div>

<div class="layout">
  <aside class="sidebar">
    <h3>Search</h3>
    <input type="text" id="search" placeholder="filter plans..." />

    <h3>Groups</h3>
    <ul class="group-list" id="group-list"></ul>

    <h3>Tags</h3>
    <ul class="tag-list" id="tag-list"></ul>

    <h3>View</h3>
    <ul class="group-list" id="view-list"></ul>
  </aside>

  <main class="main">
    <div class="card-grid" id="card-grid"></div>
    <div class="empty-state" id="empty-state">
      Loading plans...
    </div>
  </main>
</div>

<!-- overlay for editing -->
<div class="overlay" id="overlay">
  <div class="overlay-panel" id="overlay-panel"></div>
</div>

<!-- confirmation modal for archive -->
<div class="overlay" id="confirm-overlay">
  <div class="overlay-panel" style="width:380px;text-align:center" id="confirm-panel"></div>
</div>

<!-- archive drop zone -->
<div class="archive-zone" id="archive-zone">
  <span class="zone-icon">&#x1F4E4;</span>
  <span class="zone-label">Drop to archive</span>
</div>

<script>
/* ── state ──────────────────────────────────────────────────────── */
let plans = [];
let activeGroup = null;
let activeTag = null;
let activeFilter = 'all';
let showArchived = false;
let searchTimer = null;

/* ── theme ──────────────────────────────────────────────────────── */
document.getElementById('theme-btn').addEventListener('click', () => {
  const r = document.documentElement;
  r.dataset.theme = r.dataset.theme === 'dark' ? 'light' : 'dark';
  try { localStorage.setItem('pb-theme', r.dataset.theme); } catch {}
});
(function () {
  try {
    let t = localStorage.getItem('pb-theme');
    if (!t) {
      t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      localStorage.setItem('pb-theme', t);
    }
    document.documentElement.dataset.theme = t;
  } catch {}
})();

/* ── data ───────────────────────────────────────────────────────── */
async function loadPlans() {
  const empty = document.getElementById('empty-state');
  empty.textContent = 'Loading plans...';
  empty.style.display = '';
  try {
    const res = await fetch('/api/plans');
    if (!res.ok) throw new Error(res.statusText);
    plans = await res.json();
    buildSidebar();
    render();
  } catch (err) {
    empty.textContent = 'Failed to load plans. Is the server running?';
  }
}

async function savePlan(id, body) {
  const res = await fetch('/api/plan/' + encodeURIComponent(id), {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  if (!res.ok) return;
  const updated = await res.json();
  const idx = plans.findIndex(p => p.id === id);
  if (idx !== -1) plans[idx] = updated;
  buildSidebar();
  render();
}

async function rescan() {
  const btn = document.getElementById('rescan-btn');
  btn.textContent = 'Scanning...';
  btn.disabled = true;
  try {
    const res = await fetch('/api/scan', { method: 'POST' });
    const data = await res.json();
    plans = data.plans || [];
    buildSidebar();
    render();
    btn.textContent = 'Found ' + data.onDisk;
    setTimeout(() => { btn.textContent = 'Rescan'; btn.disabled = false; }, 1500);
  } catch (err) {
    btn.textContent = 'Error';
    setTimeout(() => { btn.textContent = 'Rescan'; btn.disabled = false; }, 2000);
  }
}

/* ── sidebar ────────────────────────────────────────────────────── */
function buildSidebar() {
  const activePlans = plans.filter(p => !p.archived);
  const archivedPlans = plans.filter(p => p.archived);

  /* groups (only from non-archived) */
  const groupMap = {};
  activePlans.forEach(p => {
    const g = p.group || null;
    groupMap[g] = (groupMap[g] || 0) + 1;
  });
  const gl = document.getElementById('group-list');
  const ungrouped = activePlans.filter(p => !p.group).length;
  const allActive = activeFilter === 'all';
  const ungroupedActive = activeFilter === 'group' && activeGroup === '__ungrouped__';

  let groupHtml = '<li data-action="clear" class="' + (allActive ? 'active' : '') + '">'
    + 'All <span class="group-count">' + activePlans.length + '</span></li>';

  if (ungrouped > 0) {
    groupHtml += '<li data-action="group" data-group="__ungrouped__" class="' + (ungroupedActive ? 'active' : '') + '">'
      + 'Ungrouped <span class="group-count">' + ungrouped + '</span></li>';
  }

  Object.keys(groupMap).sort().forEach(g => {
    if (g === 'null' || !g) return;
    const isActive = activeFilter === 'group' && activeGroup === g;
    groupHtml += '<li data-action="group" data-group="' + esc(g) + '" class="' + (isActive ? 'active' : '') + '">'
      + esc(g) + ' <span class="group-count">' + groupMap[g] + '</span></li>';
  });
  gl.innerHTML = groupHtml;

  /* tags (from all non-archived) */
  const tagMap = {};
  activePlans.forEach(p => (p.tags || []).forEach(t => { tagMap[t] = (tagMap[t] || 0) + 1; }));
  const tl = document.getElementById('tag-list');
  if (Object.keys(tagMap).length === 0) {
    tl.innerHTML = '<li style="color:var(--fg-faint);font-size:11px">No tags yet</li>';
  } else {
    let tagHtml = '';
    Object.keys(tagMap).sort().forEach(t => {
      const isActive = activeFilter === 'tag' && activeTag === t;
      tagHtml += '<li data-action="tag" data-tag="' + esc(t) + '" class="' + (isActive ? 'active' : '') + '">'
        + esc(t) + ' <span class="tag-count">' + tagMap[t] + '</span></li>';
    });
    tl.innerHTML = tagHtml;
  }

  /* view toggle */
  const vl = document.getElementById('view-list');
  vl.innerHTML = '<li data-action="view-toggle" data-view="active" class="' + (!showArchived ? 'active' : '') + '">'
    + 'Active <span class="group-count">' + activePlans.length + '</span></li>'
    + '<li data-action="view-toggle" data-view="archived" class="' + (showArchived ? 'active' : '') + '">'
    + 'Archived <span class="group-count">' + archivedPlans.length + '</span></li>';
}

function clearFilters() {
  activeGroup = null;
  activeTag = null;
  activeFilter = 'all';
  buildSidebar();
  render();
}
function setGroupFilter(g) {
  activeGroup = g;
  activeTag = null;
  activeFilter = 'group';
  buildSidebar();
  render();
}
function setTagFilter(t) {
  activeTag = t;
  activeGroup = null;
  activeFilter = 'tag';
  buildSidebar();
  render();
}
function toggleView(view) {
  showArchived = (view === 'archived');
  buildSidebar();
  render();
}

/* ── rendering ──────────────────────────────────────────────────── */
function render() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  const filtered = plans.filter(p => {
    /* archived filter — show only archived or only active */
    if (showArchived && !p.archived) return false;
    if (!showArchived && p.archived) return false;
    /* group/tag filters */
    if (activeGroup === '__ungrouped__' && p.group) return false;
    if (activeGroup && activeGroup !== '__ungrouped__' && p.group !== activeGroup) return false;
    if (activeTag && !(p.tags || []).includes(activeTag)) return false;
    if (q) {
      const hay = [p.title, p.notes, ...(p.tags || []), ...(p.chapter_labels || [])].join(' ').toLowerCase();
      return hay.includes(q);
    }
    return true;
  });

  const grid = document.getElementById('card-grid');
  const empty = document.getElementById('empty-state');
  document.getElementById('plan-count').textContent =
    filtered.length + ' plan' + (filtered.length !== 1 ? 's' : '');

  if (filtered.length === 0) {
    grid.innerHTML = '';
    empty.textContent = plans.length === 0 ? 'No plans found. Click Rescan.' : 'No plans match your filters.';
    empty.style.display = '';
    return;
  }
  empty.style.display = 'none';

  grid.innerHTML = filtered.map(p => {
    const date = safeTimeAgo(p.rendered_at);
    const status = p.status || '';
    const chapters = (p.chapter_labels || []).length;
    const tags = (p.tags || []).map(t => '<span class="tag-chip">' + esc(t) + '</span>').join('');
    const notes = p.notes ? '<div class="card-notes">' + esc(p.notes) + '</div>' : '';
    const missing = p._missing ? '<span style="color:var(--accent);font-size:11px;margin-left:8px">MISSING</span>' : '';

    return '<div class="card" data-plan-id="' + esc(p.id) + '">'
      + '<a class="card-title" href="' + esc(pathUrl(p.html)) + '" target="_blank" style="text-decoration:none;color:inherit;display:block">' + esc(p.title) + missing + '</a>'
      + '<div class="card-meta">'
      + (status ? '<span class="status-badge" data-status="' + esc(status) + '">' + esc(status) + '</span>' : '')
      + '<span>' + date + '</span>'
      + (chapters ? '<span class="card-chapters">' + chapters + ' chapter' + (chapters !== 1 ? 's' : '') + '</span>' : '')
      + '</div>'
      + (tags ? '<div class="card-tags">' + tags + '</div>' : '')
      + notes
      + '<div class="card-actions">'
      + '<a class="btn" href="' + esc(pathUrl(p.html)) + '" target="_blank">Open</a>'
      + '<button class="btn" data-plan-edit="' + esc(p.id) + '">Edit</button>'
      + (showArchived
        ? '<button class="btn" data-plan-unarchive="' + esc(p.id) + '">Unarchive</button>'
        : '<button class="btn" data-plan-archive="' + esc(p.id) + '">Archive</button>')
      + '</div>'
      + '</div>';
  }).join('');
}

/* ── overlay / edit ─────────────────────────────────────────────── */
function openOverlay(id) {
  const p = plans.find(x => x.id === id);
  if (!p) return;
  const panel = document.getElementById('overlay-panel');
  const chapters = (p.chapter_labels || []).map(l => '<li>' + esc(l) + '</li>').join('');

  panel.innerHTML = '<h2>' + esc(p.title) + '</h2>'
    + '<div class="card-meta" style="margin-bottom:0">'
    + (p.status ? '<span class="status-badge" data-status="' + esc(p.status) + '">' + esc(p.status) + '</span>' : '')
    + '<span>' + safeTimeAgo(p.rendered_at) + '</span>'
    + '<span>' + (p.chapter_labels||[]).length + ' chapters</span>'
    + '</div>'
    + (chapters ? '<ul class="chapter-list">' + chapters + '</ul>' : '')
    + '<label class="field-label">Tags</label>'
    + '<input class="field-input" id="edit-tags" value="' + esc((p.tags||[]).join(', ')) + '" />'
    + '<div class="field-hint">Comma-separated</div>'
    + '<label class="field-label">Group</label>'
    + '<input class="field-input" id="edit-group" value="' + esc(p.group || '') + '" />'
    + '<div class="field-hint">Virtual group name (blank = ungrouped)</div>'
    + '<label class="field-label">Notes</label>'
    + '<textarea class="field-input" id="edit-notes">' + esc(p.notes || '') + '</textarea>'
    + '<label class="field-label" style="margin-top:14px;display:flex;align-items:center;gap:8px;cursor:pointer">'
    + '<input type="checkbox" id="edit-archived"' + (p.archived ? ' checked' : '') + ' />'
    + 'Archive this plan (hidden from default view)'
    + '</label>'
    + '<div class="overlay-actions">'
    + '<button class="btn" data-overlay="cancel">Cancel</button>'
    + '<a class="btn" href="' + esc(pathUrl(p.html)) + '" target="_blank">Open in new tab</a>'
    + '<button class="btn btn-accent" data-overlay="save">Save</button>'
    + '</div>';

  panel.dataset.editId = id;
  document.getElementById('overlay').classList.add('open');
}

function closeOverlay() {
  document.getElementById('overlay').classList.remove('open');
}

async function saveOverlay() {
  const id = document.getElementById('overlay-panel').dataset.editId;
  if (!id) return;
  const tags = document.getElementById('edit-tags').value
    .split(',').map(s => s.trim()).filter(Boolean);
  const group = document.getElementById('edit-group').value.trim() || null;
  const notes = document.getElementById('edit-notes').value.trim();
  const archived = document.getElementById('edit-archived').checked;
  await savePlan(id, { tags, group, notes, archived });
  closeOverlay();
}

/* ── archive confirmation ──────────────────────────────────────── */
function confirmArchive(id) {
  const p = plans.find(x => x.id === id);
  if (!p) return;
  const panel = document.getElementById('confirm-panel');
  panel.innerHTML = '<h2 style="font-size:16px;margin-bottom:8px">Archive plan?</h2>'
    + '<p style="font-size:13px;color:var(--fg-muted);margin-bottom:16px">'
    + '"' + esc(p.title) + '" will be hidden from the default view.</p>'
    + '<div class="overlay-actions" style="justify-content:center">'
    + '<button class="btn" data-confirm="cancel">Cancel</button>'
    + '<button class="btn btn-accent" data-confirm="archive">Archive</button>'
    + '</div>';
  panel.dataset.archiveId = id;
  document.getElementById('confirm-overlay').classList.add('open');
}

function confirmUnarchive(id) {
  const p = plans.find(x => x.id === id);
  if (!p) return;
  const panel = document.getElementById('confirm-panel');
  panel.innerHTML = '<h2 style="font-size:16px;margin-bottom:8px">Unarchive plan?</h2>'
    + '<p style="font-size:13px;color:var(--fg-muted);margin-bottom:16px">'
    + '"' + esc(p.title) + '" will return to the active view.</p>'
    + '<div class="overlay-actions" style="justify-content:center">'
    + '<button class="btn" data-confirm="cancel">Cancel</button>'
    + '<button class="btn btn-accent" data-confirm="unarchive">Unarchive</button>'
    + '</div>';
  panel.dataset.archiveId = id;
  document.getElementById('confirm-overlay').classList.add('open');
}

async function doArchive() {
  const id = document.getElementById('confirm-panel').dataset.archiveId;
  if (!id) return;
  await savePlan(id, { archived: true });
  document.getElementById('confirm-overlay').classList.remove('open');
}

async function doUnarchive() {
  const id = document.getElementById('confirm-panel').dataset.archiveId;
  if (!id) return;
  await savePlan(id, { archived: false });
  document.getElementById('confirm-overlay').classList.remove('open');
}

/* ── drag-to-archive ────────────────────────────────────────────── */
let dragState = null;
let dragSuppressClick = false;

document.addEventListener('mousedown', e => {
  if (e.button !== 0) return;
  const card = e.target.closest('[data-plan-id]');
  if (!card || e.target.closest('a') || e.target.closest('button')) return;
  const rect = card.getBoundingClientRect();
  dragState = {
    card,
    ghost: null,
    offsetX: e.clientX - rect.left,
    offsetY: e.clientY - rect.top,
    startX: e.clientX,
    startY: e.clientY,
    cardX: rect.left,
    cardY: rect.top,
    w: rect.width,
    h: rect.height,
    moved: false,
  };
});

document.addEventListener('mousemove', e => {
  if (!dragState) return;
  const dx = e.clientX - dragState.startX;
  const dy = e.clientY - dragState.startY;
  if (!dragState.moved) {
    if (Math.abs(dx) < 6 && Math.abs(dy) < 6) return;
    dragState.moved = true;
    dragState.card.classList.add('dragging');
    const clone = dragState.card.cloneNode(true);
    clone.className = 'card drag-ghost';
    clone.style.left = dragState.cardX + 'px';
    clone.style.top = dragState.cardY + 'px';
    clone.style.width = dragState.w + 'px';
    clone.style.height = dragState.h + 'px';
    document.body.appendChild(clone);
    dragState.ghost = clone;
    document.getElementById('archive-zone').classList.add('drag-active');
  }
  const ghost = dragState.ghost;
  ghost.style.left = (e.clientX - dragState.offsetX) + 'px';
  ghost.style.top = (e.clientY - dragState.offsetY) + 'px';
  const tilt = Math.max(-12, Math.min(12, dx * 0.12));
  ghost.style.transform = `rotate(${tilt}deg)`;
  const zone = document.getElementById('archive-zone');
  const zr = zone.getBoundingClientRect();
  if (e.clientX >= zr.left && e.clientX <= zr.right && e.clientY >= zr.top && e.clientY <= zr.bottom) {
    zone.classList.add('drag-hover');
  } else {
    zone.classList.remove('drag-hover');
  }
});

document.addEventListener('mouseup', e => {
  if (!dragState) return;
  const { card, ghost, moved } = dragState;
  dragState = null;
  card.classList.remove('dragging');
  const zone = document.getElementById('archive-zone');
  zone.classList.remove('drag-active');
  const wasOver = zone.classList.contains('drag-hover');
  zone.classList.remove('drag-hover');
  if (ghost) ghost.remove();
  if (!moved) return;
  dragSuppressClick = true;
  setTimeout(() => { dragSuppressClick = false; }, 50);
  if (wasOver && card.dataset.planId) {
    confirmArchive(card.dataset.planId);
  }
});

/* ── event delegation (no inline onclick) ──────────────────────── */
document.addEventListener('click', e => {
  /* suppress click after drag */
  if (dragSuppressClick) { dragSuppressClick = false; return; }
  /* ── confirm modal (check first — most specific) ── */
  if (e.target.closest('[data-confirm="archive"]')) return doArchive();
  if (e.target.closest('[data-confirm="unarchive"]')) return doUnarchive();
  if (e.target.closest('[data-confirm="cancel"]')) return document.getElementById('confirm-overlay').classList.remove('open');
  if (e.target.id === 'confirm-overlay') return document.getElementById('confirm-overlay').classList.remove('open');

  /* ── edit overlay ── */
  if (e.target.closest('[data-overlay="save"]')) return saveOverlay();
  if (e.target.closest('[data-overlay="cancel"]')) return closeOverlay();
  if (e.target.id === 'overlay') return closeOverlay();

  /* ── card action buttons ── */
  const editBtn = e.target.closest('[data-plan-edit]');
  if (editBtn) { e.stopPropagation(); return openOverlay(editBtn.dataset.planEdit); }
  const archBtn = e.target.closest('[data-plan-archive]');
  if (archBtn) { e.stopPropagation(); return confirmArchive(archBtn.dataset.planArchive); }
  const unarchBtn = e.target.closest('[data-plan-unarchive]');
  if (unarchBtn) { e.stopPropagation(); return confirmUnarchive(unarchBtn.dataset.planUnarchive); }

  /* ── card body click (only when not in .card-actions or a link) ── */
  const card = e.target.closest('[data-plan-id]');
  if (card && !e.target.closest('.card-actions') && !e.target.closest('a[href]')) return openOverlay(card.dataset.planId);

  /* ── sidebar ── */
  const groupLi = e.target.closest('[data-action="group"]');
  if (groupLi) return setGroupFilter(groupLi.dataset.group);
  const clearLi = e.target.closest('[data-action="clear"]');
  if (clearLi) return clearFilters();
  const tagLi = e.target.closest('[data-action="tag"]');
  if (tagLi) return setTagFilter(tagLi.dataset.tag);
  const viewLi = e.target.closest('[data-action="view-toggle"]');
  if (viewLi) return toggleView(viewLi.dataset.view);
});

/* rescan button */
document.getElementById('rescan-btn').addEventListener('click', rescan);

/* search with debounce */
document.getElementById('search').addEventListener('input', () => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(render, 150);
});

/* keyboard: Escape closes overlays */
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    document.getElementById('confirm-overlay').classList.remove('open');
    closeOverlay();
  }
});

/* ── helpers ────────────────────────────────────────────────────── */
function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function pathUrl(path) {
  return String(path || '').split('/').map(encodeURIComponent).join('/');
}

function safeTimeAgo(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  if (isNaN(d.getTime())) return '';
  const diff = (Date.now() - d.getTime()) / 1000;
  if (diff < 60) return 'just now';
  if (diff < 3600) return Math.floor(diff/60) + 'm ago';
  if (diff < 86400) return Math.floor(diff/3600) + 'h ago';
  if (diff < 604800) return Math.floor(diff/86400) + 'd ago';
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

/* ── init ───────────────────────────────────────────────────────── */
loadPlans();
</script>
